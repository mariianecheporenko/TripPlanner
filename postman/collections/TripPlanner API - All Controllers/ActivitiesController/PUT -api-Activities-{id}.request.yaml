$kind: http-request
name: PUT /api/Activities/{id}
url: "{{baseUrl}}/api/Activities/{{activityId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{activityId}}",
      "destinationId": "{{destinationId}}",
      "title": "City Tour Extended",
      "type": 2,
      "startTime": "2026-07-05T10:00:00Z",
      "endTime": "2026-07-05T14:00:00Z",
      "cost": 40,
      "sortOrder": 1
    }
scripts:
  - type: afterResponse
    code: pm.response.to.have.status(204);
    language: text/javascript
order: 4000
