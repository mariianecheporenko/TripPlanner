$kind: http-request
name: PUT /api/TripMembers/{id}
url: "{{baseUrl}}/api/TripMembers/{{tripMemberId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{tripMemberId}}",
      "tripId": "{{tripId}}",
      "userId": "{{userId}}",
      "role": 0,
      "inviteStatus": "Accepted",
      "personalBudget": 550
    }
scripts:
  - type: afterResponse
    code: pm.response.to.have.status(204);
    language: text/javascript
order: 4000
