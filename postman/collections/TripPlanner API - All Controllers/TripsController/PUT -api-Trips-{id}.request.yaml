$kind: http-request
name: PUT /api/Trips/{id}
url: "{{baseUrl}}/api/Trips/{{tripId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{tripId}}",
      "title": "Postman Summer Trip Updated",
      "startDate": "2026-07-01T08:00:00Z",
      "endDate": "2026-07-11T20:00:00Z",
      "currency": "USD",
      "status": 1
    }
scripts:
  - type: afterResponse
    code: pm.response.to.have.status(204);
    language: text/javascript
order: 4000
