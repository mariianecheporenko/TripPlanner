$kind: http-request
name: PUT /api/TripHistories/{id}
url: "{{baseUrl}}/api/TripHistories/{{tripHistoryId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{tripHistoryId}}",
      "tripId": "{{tripId}}",
      "userId": "{{userId}}",
      "action": 1,
      "description": "Trip updated from Postman test",
      "entityType": "Trip",
      "entityId": "{{tripId}}"
    }
scripts:
  - type: afterResponse
    code: pm.response.to.have.status(204);
    language: text/javascript
order: 4000
