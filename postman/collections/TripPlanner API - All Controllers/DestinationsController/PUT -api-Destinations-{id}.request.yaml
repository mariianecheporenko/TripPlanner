$kind: http-request
name: PUT /api/Destinations/{id}
url: "{{baseUrl}}/api/Destinations/{{destinationId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{destinationId}}",
      "tripId": "{{tripId}}",
      "city": "Lviv",
      "country": "Ukraine",
      "countryCode": "UA",
      "sortOrder": 2,
      "arrivalDate": "2026-07-04T09:00:00Z",
      "departureDate": "2026-07-06T18:00:00Z"
    }
scripts:
  - type: afterResponse
    code: pm.response.to.have.status(204);
    language: text/javascript
order: 4000
