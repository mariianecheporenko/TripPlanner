$kind: http-request
name: PUT /api/Users/{id}
url: "{{baseUrl}}/api/Users/{{userId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{userId}}",
      "displayName": "Postman User Updated",
      "email": "updated.user@example.com",
      "passwordHash": "hash_456",
      "isActive": true
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 204', function () { pm.response.to.have.status(204); });
    language: text/javascript
order: 4000
