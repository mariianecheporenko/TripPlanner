$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/api/Users'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "displayName": "Mary Test",
      "email": "mary@example.com",
      "passwordHash": "hashed_password_here",
      "phoneNumber": "+380991234567",
      "avatarUrl": null,
      "isActive": true
    }
